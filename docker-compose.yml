services:
  aerial-detect:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      - RTSP_URL
      - WEB_PORT=8080
    volumes:
      - ${AERIAL_DATA:-~/aerial-detect-data}/config:/app/config
      - ${AERIAL_DATA:-~/aerial-detect-data}/data:/app/data
    stop_signal: SIGINT
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
