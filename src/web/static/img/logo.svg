<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Outer circle -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#22c55e" stroke-width="3"/>

  <!-- Concentric target rings -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="64" cy="64" r="32" fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="64" cy="64" r="18" fill="none" stroke="#22c55e" stroke-width="2"/>

  <!-- Crosshair lines extending through all rings -->
  <line x1="64" y1="2" x2="64" y2="126" stroke="#22c55e" stroke-width="2"/>
  <line x1="2" y1="64" x2="126" y2="64" stroke="#22c55e" stroke-width="2"/>

  <!-- Object in crosshairs — small aircraft/UAP shape -->
  <circle cx="64" cy="64" r="5" fill="#22c55e" opacity="0.15"/>
  <circle cx="64" cy="64" r="3" fill="#22c55e" opacity="0.85"/>
  <circle cx="64" cy="64" r="1.2" fill="#fff" opacity="0.95"/>

  <!-- Trajectory trail (approaching from lower-left) -->
  <circle cx="42" cy="86" r="1.5" fill="#22c55e" opacity="0.2"/>
  <circle cx="48" cy="80" r="1.5" fill="#22c55e" opacity="0.3"/>
  <circle cx="54" cy="74" r="1.8" fill="#22c55e" opacity="0.45"/>
  <circle cx="59" cy="69" r="2" fill="#22c55e" opacity="0.6"/>
</svg>
