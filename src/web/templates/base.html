<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aerial Detection{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="stylesheet" href="/static/css/dashboard.css?v=0.4.6">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><img src="/static/img/logo.svg" alt="" class="nav-logo">Aerial Object Detection</div>
        <div class="nav-system">
            <span id="sys-cpu" class="sys-badge">CPU --</span>
            <span id="sys-mem" class="sys-badge">MEM --</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">Dashboard</a>
            <a href="/history" class="nav-link{% if request.url.path == '/history' %} active{% endif %}">History</a>
            <a href="/settings" class="nav-link{% if request.url.path == '/settings' %} active{% endif %}">Settings</a>
            <a href="/zones" class="nav-link{% if request.url.path == '/zones' %} active{% endif %}">Zones</a>
        </div>
        <div class="nav-status">
            {% block nav_status %}{% endblock %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <span>Aerial Object Detection v0.4.6</span> &middot; <a href="https://github.com/djtrustgod/Aerial-Object-Detection" target="_blank" rel="noopener noreferrer">GitHub Project</a>
    </footer>

    <script>
    (function() {
        async function pollSystem() {
            try {
                const resp = await fetch('/api/stats');
                const s = await resp.json();
                const cpuEl = document.getElementById('sys-cpu');
                const memEl = document.getElementById('sys-mem');
                if (cpuEl) cpuEl.textContent = 'CPU ' + s.cpu_percent.toFixed(0) + '%';
                if (memEl) memEl.textContent = 'MEM ' + s.mem_percent.toFixed(0) + '%';
            } catch (e) {}
        }
        pollSystem();
        setInterval(pollSystem, 3000);
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
